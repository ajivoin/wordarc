name: wordarc
description: A Wordscapes-style word puzzle game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.3.0

  # Models / codegen
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  just_audio: ^0.9.41
  soundpool: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Codegen
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # Lints
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dictionary/enable.txt.gz
    - assets/levels/manifest.json

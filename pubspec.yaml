name: wordarc
description: A Wordscapes-style word puzzle game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  freezed_annotation: ^2.4.4
  go_router: ^14.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  just_audio: ^0.9.41
  riverpod_annotation: ^2.6.1
  soundpool: ^2.3.0

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter

  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dictionary/enable.txt.gz
    - assets/levels/manifest.json
